name: Error code documentation reminder

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - southworks/add/error-helper-workflow
    paths:
      - 'packages/**/src/errorHelper.ts'

permissions:
  contents: read

jobs:
  create-doc-issue:
    name: Create documentation issue
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed error helper files
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          event_name="${{ github.event_name }}"
          base_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"
          empty_tree="$(git hash-object -t tree /dev/null)"

          if [[ "$event_name" == "workflow_dispatch" ]]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              base_ref="HEAD^"
            else
              base_ref="$empty_tree"
            fi
          elif [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              base_ref="HEAD^"
            else
              base_ref="$empty_tree"
            fi
          else
            base_ref="$base_sha"

            if ! git cat-file -e "$base_ref^{commit}" 2>/dev/null; then
              git fetch --no-tags --depth=1 origin "$base_ref" || true
            fi

            if ! git cat-file -e "$base_ref^{commit}" 2>/dev/null; then
              echo "::warning::Base commit $base_ref is not available in the checkout. Falling back to HEAD^."

              if git rev-parse HEAD^ >/dev/null 2>&1; then
                base_ref="HEAD^"
              else
                base_ref="$empty_tree"
              fi
            fi
          fi

          if git cat-file -e "$head_sha^{commit}" 2>/dev/null; then
            head_ref="$head_sha"
          else
            echo "::warning::Head commit $head_sha is not available in the checkout. Falling back to HEAD."
            head_ref="HEAD"
          fi

          echo "Comparing $base_ref..$head_ref"
          changed_files="$(git diff --name-only "$base_ref" "$head_ref" | grep -E '^packages/[^/]+/src/[Ee]rrorHelper\.ts$' || true)"

          {
            echo 'files<<EOF'
            printf '%s\n' "$changed_files"
            echo 'EOF'
            echo "count=$(printf '%s\n' "$changed_files" | grep -c . || true)"
          } >> "$GITHUB_OUTPUT"

