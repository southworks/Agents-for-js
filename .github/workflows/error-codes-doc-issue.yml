name: Error code documentation reminder

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - southworks/add/error-helper-workflow
    paths:
      - 'packages/**/src/errorHelper.ts'

permissions:
  contents: read

jobs:
  create-doc-issue:
    name: Create documentation issue
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed error helper files
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          base_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"

          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              base_sha="HEAD^"
            else
              base_sha="$(git hash-object -t tree /dev/null)"
            fi
          fi

          changed_files="$(git diff --name-only "$base_sha" "$head_sha" | grep -E '^packages/[^/]+/src/[Ee]rrorHelper\.ts$' || true)"

          {
            echo 'files<<EOF'
            printf '%s\n' "$changed_files"
            echo 'EOF'
            echo "count=$(printf '%s\n' "$changed_files" | grep -c . || true)"
          } >> "$GITHUB_OUTPUT"

